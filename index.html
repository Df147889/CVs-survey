<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نموذج بيانات السيرة الذاتية | CV Data Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --font-en: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-ar: 'Cairo', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-en);
    }

    body.ar {
      font-family: var(--font-ar);
    }

    .lang-switcher {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 999;
      display: flex;
      gap: 4px;
      background: #fff;
      border: 1px solid #dde6e6;
      border-radius: 20px;
      padding: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    [dir="rtl"] .lang-switcher {
      right: auto;
      left: 1rem;
    }

    .lang-btn {
      padding: 5px 14px;
      border-radius: 16px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: #777;
    }

    .lang-btn.active {
      background: #1E2142;
      color: #4FBAB5;
    }

    .page {
      background: #f0f4f5;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 4px;
      max-width: 780px;
      margin: 0 auto 1.5rem;
      padding: 2rem 2.5rem;
      border: 0.5px solid #dde6e6;
    }

    .header-card {
      border-top: 5px solid #1E2142;
    }

    .logo-section {
      margin-bottom: 1.5rem;
    }

    .logo-img {
      max-height: 60px;
      max-width: 200px;
      object-fit: contain;
    }

    .form-title {
      font-size: 22px;
      font-weight: 700;
      color: #1E2142;
      margin-bottom: 0.4rem;
    }

    .accent-line {
      width: 40px;
      height: 3px;
      background: #4FBAB5;
      margin-bottom: 1.25rem;
      border-radius: 2px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #4FBAB5;
      margin-bottom: 0.5rem;
    }

    .purpose-text {
      font-size: 14px;
      color: #444;
      line-height: 1.8;
      margin-bottom: 1.25rem;
    }

    .definition-box {
      background: #f4f8f8;
      border-radius: 0 4px 4px 0;
      padding: 1rem 1.25rem;
      margin-bottom: 0;
    }

    [dir="ltr"] .definition-box {
      border-left: 3px solid #4FBAB5;
    }

    [dir="rtl"] .definition-box {
      border-right: 3px solid #4FBAB5;
      border-left: none;
      border-radius: 4px 0 0 4px;
    }

    .definition-box p {
      font-size: 14px;
      color: #444;
      line-height: 1.8;
      margin-bottom: 0.75rem;
    }

    .definition-box p:last-child {
      margin-bottom: 0;
    }

    .conditions-title {
      font-size: 13px;
      font-weight: 600;
      color: #1E2142;
      margin-bottom: 0.5rem;
    }

    .condition-list {
      list-style: none;
      padding: 0;
      margin-bottom: 0.75rem;
    }

    .condition-list li {
      font-size: 13px;
      color: #555;
      padding: 4px 0;
      position: relative;
      line-height: 1.6;
    }

    [dir="ltr"] .condition-list li {
      padding-left: 1.2rem;
    }

    [dir="rtl"] .condition-list li {
      padding-right: 1.2rem;
    }

    [dir="ltr"] .condition-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 11px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4FBAB5;
    }

    [dir="rtl"] .condition-list li::before {
      content: '';
      position: absolute;
      right: 0;
      top: 11px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4FBAB5;
    }

    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: #1E2142;
      margin-bottom: 0.5rem;
      display: block;
    }

    .field-sub-label {
      font-size: 12px;
      color: #656664;
      margin-bottom: 0.4rem;
      display: block;
      font-weight: 500;
    }

    .required {
      color: #E16D5A;
      margin: 0 2px;
    }

    .field-hint {
      font-size: 11px;
      color: #999;
      margin-top: 0.35rem;
      line-height: 1.5;
    }

    input[type=text],
    input[type=number] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #c8d8d8;
      border-radius: 4px;
      font-size: 14px;
      color: #1E2142;
      background: #fff;
      transition: border-color 0.2s;
      outline: none;
      font-family: inherit;
    }

    input[type=text]:focus,
    input[type=number]:focus {
      border-color: #4FBAB5;
      box-shadow: 0 0 0 3px rgba(79, 186, 181, 0.12);
    }

    select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #c8d8d8;
      border-radius: 4px;
      font-size: 14px;
      color: #1E2142;
      background: #fff;
      transition: border-color 0.2s;
      outline: none;
      font-family: inherit;
      cursor: pointer;
    }

    select:focus {
      border-color: #4FBAB5;
      box-shadow: 0 0 0 3px rgba(79, 186, 181, 0.12);
    }

    textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #c8d8d8;
      border-radius: 4px;
      font-size: 13px;
      color: #1E2142;
      background: #fff;
      resize: vertical;
      min-height: 70px;
      line-height: 1.6;
      transition: border-color 0.2s;
      outline: none;
      font-family: inherit;
    }

    textarea:focus {
      border-color: #4FBAB5;
      box-shadow: 0 0 0 3px rgba(79, 186, 181, 0.12);
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.1rem;
    }

    .field {
      margin-bottom: 1.1rem;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field-row .field {
      margin-bottom: 0;
    }

    .full {
      grid-column: span 2;
    }

    /* pill-style multi/single select (languages) */
    .pill-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .pill-input {
      display: none;
    }

    .pill-label {
      padding: 6px 16px;
      border: 1px solid #c8d8d8;
      border-radius: 20px;
      font-size: 12px;
      color: #656664;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .pill-input:checked+.pill-label {
      background: #1E2142;
      border-color: #1E2142;
      color: #4FBAB5;
    }

    .other-lang-wrap {
      margin-top: 0.75rem;
      display: none;
    }

    .other-lang-wrap.show {
      display: block;
    }

    /* file upload */
    .file-drop {
      display: block;
      width: 100%;
      border: 1.5px dashed #4FBAB5;
      border-radius: 4px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f4f8f8;
    }

    .file-drop:hover {
      background: #eaf3f3;
    }

    .file-drop input {
      display: none;
    }

    .file-drop .fd-icon {
      font-size: 26px;
      color: #4FBAB5;
      margin-bottom: 0.5rem;
    }

    .file-drop .fd-text {
      font-size: 13px;
      color: #1E2142;
      font-weight: 600;
    }

    .file-drop .fd-sub {
      font-size: 11px;
      color: #999;
      margin-top: 0.35rem;
    }

    .photo-preview {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 0.6rem;
      border: 3px solid #4FBAB5;
      display: block;
    }

    .file-name {
      font-size: 13px;
      color: #1E2142;
      margin-top: 0.75rem;
      font-weight: 500;
      word-break: break-all;
    }

    .file-name .fn-clear {
      color: #E16D5A;
      cursor: pointer;
      margin: 0 6px;
      font-weight: 700;
    }

    /* project cards */
    .question-card,
    .edu-card,
    .exp-card {
      background: #fff;
      border: 0.5px solid #dde6e6;
      border-radius: 4px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .tool-header {
      background: #1E2142;
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .tool-number {
      font-size: 12px;
      font-weight: 600;
      color: #4FBAB5;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #7a8ab5;
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      line-height: 1;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .remove-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .tool-body {
      padding: 1.25rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .tool-field {
      grid-column: span 1;
    }

    .tool-field.full {
      grid-column: span 2;
    }

    .add-tool-btn {
      width: 100%;
      padding: 12px;
      border: 1.5px dashed #4FBAB5;
      border-radius: 4px;
      background: transparent;
      color: #4FBAB5;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
      font-family: inherit;
    }

    .add-tool-btn:hover {
      background: #f4f8f8;
      border-style: solid;
    }

    .submit-section {
      text-align: center;
      padding: 1rem 0 0;
    }

    .test-btn {
      display: block;
      margin: 0 auto 1rem;
      background: #f4f8f8;
      color: #4FBAB5;
      border: 1.5px dashed #4FBAB5;
      padding: 8px 22px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }
    .test-btn:hover { background: #eaf3f3; }

    .submit-btn {
      background: #1E2142;
      color: #fff;
      border: none;
      padding: 13px 48px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s;
      font-family: inherit;
    }

    .submit-btn:hover {
      background: #4FBAB5;
      color: #1E2142;
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 1rem;
    }

    .section-header {
      margin-bottom: 1.25rem;
    }

    .section-header h3 {
      font-size: 16px;
      font-weight: 600;
      color: #1E2142;
      margin-bottom: 0.25rem;
    }

    .section-header p {
      font-size: 13px;
      color: #777;
      line-height: 1.6;
    }

    .section-num {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      color: #4FBAB5;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    @media (max-width: 520px) {
      .tool-body {
        grid-template-columns: 1fr;
      }

      .tool-field.full {
        grid-column: span 1;
      }

      .field-row {
        grid-template-columns: 1fr;
      }

      .full {
        grid-column: span 1;
      }

      .card {
        padding: 1.5rem 1.25rem;
      }
    }
  </style>
</head>

<body class="ar">

  <div class="lang-switcher">
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn active" id="btn-ar" onclick="setLang('ar')">ع</button>
  </div>

  <div class="page">

    <!-- HEADER -->
    <div class="card header-card">
      <div class="logo-section">
        <img src="color.png" alt="Impetus Logo" class="logo-img">
      </div>
      <p class="section-label" data-key="sectionLabel"></p>
      <h1 class="form-title" data-key="formTitle"></h1>
      <div class="accent-line"></div>
      <p class="purpose-text" data-key="purposeText"></p>
      <div class="definition-box">
        <p class="conditions-title" data-key="instrTitle"></p>
        <ul class="condition-list" style="margin-bottom:0" id="instrList"></ul>
      </div>
    </div>

    <!-- SECTION 1: MAIN INFO -->
    <div class="card">
      <div class="section-header">
        <span class="section-num" data-key="sec1Num"></span>
        <h3 data-key="sec1Title"></h3>
        <p data-key="sec1Desc"></p>
      </div>

      <div class="field">
        <label class="field-sub-label" data-field="fullName"></label>
        <input type="text" id="fullName" data-ph="fullNamePh">
      </div>

      <div class="field-row">
        <div class="field">
          <label class="field-sub-label" data-field="jobTitle"></label>
          <input type="text" id="jobTitle" data-ph="jobTitlePh">
        </div>
        <div class="field">
          <label class="field-sub-label" data-field="years"></label>
          <input type="number" id="years" min="0" max="60" data-ph="yearsPh">
        </div>
      </div>

      <div class="field">
        <label class="field-sub-label" data-field="education"></label>
        <div id="eduContainer"></div>
        <button class="add-tool-btn" id="btnAddEdu" onclick="addEducation()" data-key="addEduBtn"></button>
      </div>

      <div class="field">
        <label class="field-sub-label" data-field="certifications"></label>
        <textarea id="certifications" data-ph="certificationsPh"></textarea>
      </div>

      <div class="field">
        <label class="field-sub-label" data-field="languages"></label>
        <div class="pill-group" id="langGroup"></div>
        <div class="other-lang-wrap" id="otherLangWrap">
          <input type="text" id="otherLang" data-ph="otherLangPh">
        </div>
      </div>

      <div class="field">
        <label class="field-sub-label" data-field="bio"></label>
        <textarea id="bio" data-ph="bioPh" style="min-height:90px;"></textarea>
      </div>
    </div>

    <!-- SECTION 2: WORK EXPERIENCE -->
    <div class="card">
      <div class="section-header">
        <span class="section-num" data-key="sec2Num"></span>
        <h3 data-key="sec2Title"></h3>
        <p data-key="sec2Desc"></p>
      </div>
      <div id="projectsContainer"></div>
      <button class="add-tool-btn" id="btnAddProj" onclick="addProject()" data-key="addProjectBtn"></button>

      <div class="field" style="margin-top:1.75rem;">
        <label class="field-sub-label" data-field="prevExp"></label>
        <div id="expContainer"></div>
        <button class="add-tool-btn" id="btnAddExp" onclick="addExperience()" data-key="addExpBtn"></button>
      </div>
    </div>

    <!-- ATTACHMENTS -->
    <div class="card">
      <div class="section-header">
        <h3 data-key="attachTitle"></h3>
        <p data-key="attachDesc"></p>
      </div>

      <!-- Personal photo -->
      <label class="field-sub-label" data-field="photo"></label>
      <label class="file-drop" for="photoFile" style="margin-bottom:1.5rem;">
        <img class="photo-preview" id="photoPreview" style="display:none;">
        <div class="fd-icon" id="photoIcon">&#128247;</div>
        <div class="fd-text" data-key="photoBtn"></div>
        <div class="fd-sub" data-key="photoHint"></div>
        <input type="file" id="photoFile" accept=".jpg,.jpeg,.png" onchange="onPhotoSelected(event)">
      </label>
      <div class="file-name" id="photoNameDisplay" style="display:none;"></div>

      <!-- CV file -->
      <label class="field-sub-label" data-field="cv"></label>
      <label class="file-drop" for="cvFile">
        <div class="fd-icon">&#8681;</div>
        <div class="fd-text" data-key="attachBtn"></div>
        <div class="fd-sub" data-key="attachHint"></div>
        <input type="file" id="cvFile" accept=".pdf,.doc,.docx" onchange="onFileSelected(event)">
      </label>
      <div class="file-name" id="fileNameDisplay" style="display:none;"></div>
    </div>

    <!-- SUBMIT -->
    <div class="card">
      <div class="submit-section">
        <button class="test-btn" id="testBtn" onclick="fillTestData()" style="display:none;">🧪 تعبئة تجريبية / Test fill</button>
        <button class="submit-btn" id="submitBtn" onclick="submitForm()" data-key="submitBtn"></button>
        <p class="footer-note" data-key="footerNote"></p>
        <p style="text-align:center;font-size:11px;color:#c8d0d0;margin-top:6px;">v2.0 — حد المؤهلات ٥ · المشاريع ٣٠ · الخبرات ٣٠</p>
      </div>
    </div>

  </div>

      const eduBtn = document.getElementById('btnAddEdu');

      if (eduBtn) eduBtn.style.display = document.querySelectorAll('.edu-card').length >= MAX_EDU ? 'none' : 'block';

    function setLang(lang) {
      currentLang = lang;
      const html = document.documentElement;
      const body = document.body;

      if (lang === 'ar') {
        html.setAttribute('lang', 'ar'); html.setAttribute('dir', 'rtl');
        body.classList.add('ar');
        document.getElementById('btn-ar').classList.add('active');
        document.getElementById('btn-en').classList.remove('active');
      } else {
        html.setAttribute('lang', 'en'); html.setAttribute('dir', 'ltr');
        body.classList.remove('ar');
        document.getElementById('btn-en').classList.add('active');
        document.getElementById('btn-ar').classList.remove('active');
      }

      const t = translations[lang];

      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (t[key] !== undefined) el.textContent = t[key];
      });

      // labels with required asterisk
      setLabel('fullName', t.fullName, true);
      setLabel('jobTitle', t.jobTitle, true);
      setLabel('years', t.years, true);
      setLabel('education', t.education, true);
      setLabel('certifications', t.certifications, false);
      setLabel('languages', t.languages, true);
      setLabel('bio', t.bio, true);
      setLabel('prevExp', t.prevExp, false);
      setLabel('photo', t.photoLabel, false);
      setLabel('cv', t.cvLabel, true);

      // placeholders
      document.querySelectorAll('[data-ph]').forEach(el => {
        const key = el.getAttribute('data-ph');
        if (t[key] !== undefined) el.placeholder = t[key];
      });

      // languages pills
      renderLangs(t);

      // instructions list
      renderList('instrList', t.instr);

      // re-render education cards
      document.querySelectorAll('.edu-card').forEach((card, index) => {
        const num = card.querySelector('.tool-number');
        if (num) num.textContent = `${t.eduLabel} ${index + 1}`;
        const id = card.id.replace('edu-', '');
        setSub(card, `equal-${id}`, t.qualFieldLabel, true);
        setSub(card, `euniv-${id}`, t.universityLabel, false);
        setSub(card, `espec-${id}`, t.specializationLabel, false);
        setPh(card, `edu-univ-${id}`, t.universityPh);
        setPh(card, `edu-spec-${id}`, t.specializationPh);
        const sel = card.querySelector(`#edu-qual-${id}`);
        if (sel) { const v = sel.value; sel.innerHTML = qualOptionsHTML(t); sel.value = v; }
      });

      // re-render project cards
      document.querySelectorAll('.question-card').forEach((card, index) => {
        const num = card.querySelector('.tool-number');
        if (num) num.textContent = `${t.projectLabel} ${index + 1}`;
        const id = card.id.replace('proj-', '');
        setSub(card, `pname-${id}`, t.projectName, true);
        setSub(card, `prole-${id}`, t.role, true);
        setSub(card, `pdesc-${id}`, t.roleDesc, true);
        setSub(card, `pclient-${id}`, t.client, false);
        setPh(card, `proj-name-${id}`, t.projectNamePh);
        setPh(card, `proj-role-${id}`, t.rolePh);
        setPh(card, `proj-desc-${id}`, t.roleDescPh);
        setPh(card, `proj-client-${id}`, t.clientPh);
      });

      // re-render previous-experience cards
      document.querySelectorAll('.exp-card').forEach((card, index) => {
        const num = card.querySelector('.tool-number');
        if (num) num.textContent = `${t.expLabel} ${index + 1}`;
        const id = card.id.replace('exp-', '');
        setSub(card, `etitle-${id}`, t.expTitleLabel, false);
        setSub(card, `eentity-${id}`, t.expEntityLabel, false);
        setSub(card, `edesc-${id}`, t.expDescLabel, false);
        setPh(card, `exp-title-${id}`, t.expTitlePh);
        setPh(card, `exp-entity-${id}`, t.expEntityPh);
        setPh(card, `exp-desc-${id}`, t.expDescPh);
      });
    }

    function qualOptionsHTML(t, selectedVal) {
      const keys = ['Diploma', 'Bachelor', 'Master', 'PhD'];
      return `<option value="">${t.qualPlaceholder}</option>` +
        t.qualifications.map((q, i) =>
          `<option value="${keys[i]}"${selectedVal === keys[i] ? ' selected' : ''}>${q}</option>`
        ).join('');
    }

    function setLabel(field, text, required) {
      const el = document.querySelector(`[data-field="${field}"]`);
      if (el) el.innerHTML = text + (required ? '<span class="required">*</span>' : '');
    }
    function setSub(card, field, text, required) {
      const el = card.querySelector(`[data-field="${field}"]`);
      if (el) el.innerHTML = text + (required ? '<span class="required">*</span>' : '');
    }
    function setPh(card, id, text) {
      const el = card.querySelector('#' + id);
      if (el) el.placeholder = text;
    }
    function renderList(id, items) {
      const ul = document.getElementById(id);
      if (ul) ul.innerHTML = items.map(i => `<li>${i}</li>`).join('');
    }

    function renderLangs(t) {
      const group = document.getElementById('langGroup');
      // preserve checked state
      const checked = Array.from(document.querySelectorAll('.lang-check:checked')).map(c => c.value);
      const otherChecked = document.getElementById('lang-other-check')?.checked;
      const keys = ['Arabic', 'English', 'French', 'Urdu'];
      group.innerHTML = t.langOptions.map((label, i) => `
      <input type="checkbox" class="pill-input lang-check" id="lang-${i}" value="${keys[i]}">
      <label for="lang-${i}" class="pill-label">${label}</label>
    `).join('') + `
      <input type="checkbox" class="pill-input" id="lang-other-check" onchange="toggleOtherLang()">
      <label for="lang-other-check" class="pill-label">${t.langOther}</label>
    `;
      // restore
      keys.forEach((k, i) => { if (checked.includes(k)) document.getElementById('lang-' + i).checked = true; });
      if (otherChecked) { document.getElementById('lang-other-check').checked = true; }
      toggleOtherLang();
    }

    function toggleOtherLang() {
      const wrap = document.getElementById('otherLangWrap');
      const other = document.getElementById('lang-other-check');
      if (other && other.checked) wrap.classList.add('show');
      else wrap.classList.remove('show');
    }

    function onFileSelected(event) {
      const t = translations[currentLang];
      const file = event.target.files[0];
      const display = document.getElementById('fileNameDisplay');
      if (!file) { selectedFile = null; display.style.display = 'none'; return; }

      if (file.size > 10 * 1024 * 1024) {
        alert(t.alertFileSize);
        event.target.value = '';
        selectedFile = null; display.style.display = 'none';
        return;
      }

      const reader = new FileReader();
      reader.onload = function () {
        const base64 = reader.result.split(',')[1];
        selectedFile = { fileName: file.name, mimeType: file.type || 'application/octet-stream', base64: base64 };
        display.innerHTML = `&#128206; ${file.name} <span class="fn-clear" onclick="clearFile()">${t.fileClear}</span>`;
        display.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    function clearFile() {
      selectedFile = null;
      document.getElementById('cvFile').value = '';
      document.getElementById('fileNameDisplay').style.display = 'none';
    }

    function onPhotoSelected(event) {
      const t = translations[currentLang];
      const file = event.target.files[0];
      const nameDisplay = document.getElementById('photoNameDisplay');
      const preview = document.getElementById('photoPreview');
      const icon = document.getElementById('photoIcon');
      if (!file) { clearPhoto(); return; }

      if (file.size > 10 * 1024 * 1024) {
        alert(t.alertFileSize);
        event.target.value = '';
        clearPhoto();
        return;
      }

      const reader = new FileReader();
      reader.onload = function () {
        const base64 = reader.result.split(',')[1];
        selectedPhoto = { fileName: file.name, mimeType: file.type || 'image/jpeg', base64: base64 };
        preview.src = reader.result;
        preview.style.display = 'block';
        icon.style.display = 'none';
        nameDisplay.innerHTML = `&#128247; ${file.name} <span class="fn-clear" onclick="clearPhoto()">${t.fileClear}</span>`;
        nameDisplay.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    function clearPhoto() {
      selectedPhoto = null;
      document.getElementById('photoFile').value = '';
      const preview = document.getElementById('photoPreview');
      preview.style.display = 'none';
      preview.removeAttribute('src');
      document.getElementById('photoIcon').style.display = 'block';
      document.getElementById('photoNameDisplay').style.display = 'none';

    async function submitForm() {
      const t = translations[currentLang];

      const fullName = document.getElementById('fullName').value.trim();
      const jobTitle = document.getElementById('jobTitle').value.trim();
      const years = document.getElementById('years').value.trim();
      const certifications = document.getElementById('certifications').value.trim();
      const bio = document.getElementById('bio').value.trim();

      if (!fullName) { alert(t.alertName); return; }
      if (!jobTitle) { alert(t.alertJob); return; }
      if (!years) { alert(t.alertYears); return; }

      // educations (one or more qualifications)
      const educations = [];
      document.querySelectorAll('.edu-card').forEach(card => {
        const id = card.id.replace('edu-', '');
        const q = document.getElementById('edu-qual-' + id)?.value || '';
        const u = document.getElementById('edu-univ-' + id)?.value.trim() || '';
        const s = document.getElementById('edu-spec-' + id)?.value.trim() || '';
        if (q) educations.push({ qualification: q, university: u, specialization: s });
      });
      if (educations.length === 0) { alert(t.alertQual); return; }

      // languages
      const languages = Array.from(document.querySelectorAll('.lang-check:checked')).map(c => c.value);
      const otherLang = document.getElementById('lang-other-check')?.checked
        ? document.getElementById('otherLang').value.trim() : '';
      if (otherLang) languages.push(otherLang);
      if (languages.length === 0) { alert(t.alertLang); return; }

      if (!bio) { alert(t.alertBio); return; }

      // projects
      const cards = document.querySelectorAll('.question-card');
      const projects = [];
      let valid = true;
      cards.forEach(card => {
        const id = card.id.replace('proj-', '');
        const pName = document.getElementById('proj-name-' + id)?.value.trim();
        const pRole = document.getElementById('proj-role-' + id)?.value.trim();
        const pDesc = document.getElementById('proj-desc-' + id)?.value.trim();
        const pClient = document.getElementById('proj-client-' + id)?.value.trim();
        if (!pName || !pRole || !pDesc) { valid = false; return; }
        projects.push({ projectName: pName, role: pRole, roleDescription: pDesc, client: pClient });
      });
      if (!valid) { alert(t.alertProject); return; }

      // previous experiences (optional, one or more)
      const previousExperiences = [];
      document.querySelectorAll('.exp-card').forEach(card => {
        const id = card.id.replace('exp-', '');
        const title = document.getElementById('exp-title-' + id)?.value.trim() || '';
        const entity = document.getElementById('exp-entity-' + id)?.value.trim() || '';
        const desc = document.getElementById('exp-desc-' + id)?.value.trim() || '';
        if (title || entity || desc) previousExperiences.push({ title, entity, description: desc });
      });

      // CV attachment is required
      if (!selectedFile) { alert(t.alertCvRequired); return; }

      const payload = {
        timestamp: new Date().toISOString(),
        fullName, jobTitle,
        yearsExperience: years,
        educations,
        certifications,
        languages,
        bio,
        projects,
        previousExperiences,
        photoFile: selectedPhoto, // null or { fileName, mimeType, base64 }
        cvFile: selectedFile      // required { fileName, mimeType, base64 }
      };

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = t.submittingBtn;

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        submitBtn.disabled = false;
        submitBtn.textContent = t.submitBtn;
        alert(t.alertSuccess(fullName));
        resetForm();
      } catch (error) {
        submitBtn.disabled = false;
        submitBtn.textContent = t.submitBtn;
        alert(t.alertError);
      }
    }

    function resetForm() {
      ['fullName', 'jobTitle', 'years', 'certifications', 'bio', 'otherLang'].forEach(id => {
        const el = document.getElementById(id); if (el) el.value = '';
      });
      document.querySelectorAll('.lang-check, #lang-other-check').forEach(c => c.checked = false);
      toggleOtherLang();
      clearFile();
      clearPhoto();
      document.getElementById('eduContainer').innerHTML = ''; eduCount = 0; addEducation();
      document.getElementById('projectsContainer').innerHTML = ''; projectCount = 0; addProject();
      document.getElementById('expContainer').innerHTML = ''; expCount = 0; addExperience();
      updateAddButtons();
    }

    // ============ أداة الاختبار: تعبئة تلقائية (تظهر فقط مع ?test=1) ============
    function ensureCount(selector, addFn, target) {
      let n = document.querySelectorAll(selector).length;
      while (n < target) { addFn(); n++; }
    }

    function fillTestData() {
      document.getElementById('fullName').value = 'سارة الاختبار';
      document.getElementById('jobTitle').value = 'مطوّرة برمجيات';
      document.getElementById('years').value = '5';
      document.getElementById('certifications').value = 'PMP، Azure AI Engineer';
      document.getElementById('bio').value = 'نبذة تعريفية تجريبية للاختبار.';

      // اللغات: العربية + الإنجليزية
      document.querySelectorAll('.lang-check').forEach(c => {
        if (['Arabic', 'English'].includes(c.value)) c.checked = true;
      });

      // المؤهلات: مؤهلين
      ensureCount('.edu-card', addEducation, 2);
      const eduData = [
        { q: 'Bachelor', u: 'جامعة الملك سعود', s: 'علوم حاسب' },
        { q: 'Master', u: 'جامعة الملك عبدالعزيز', s: 'الذكاء الاصطناعي' }
      ];
      document.querySelectorAll('.edu-card').forEach((card, i) => {
        const d = eduData[i] || eduData[0];
        const sel = card.querySelector('select'); if (sel) sel.value = d.q;
        const ins = card.querySelectorAll('input[type=text]');
        if (ins[0]) ins[0].value = d.u;
        if (ins[1]) ins[1].value = d.s;
      });

      // المشاريع: مشروعين
      ensureCount('.question-card', addProject, 2);
      const projData = [
        { n: 'مشروع القرى التنموية', r: 'مطوّرة رئيسية', d: 'بناء نظام إدارة المشاريع', c: 'NCNP' },
        { n: 'منصة وزارة السياحة', r: 'مهندسة برمجيات', d: 'تطوير الواجهات والتقارير', c: 'وزارة السياحة' }
      ];
      document.querySelectorAll('.question-card').forEach((card, i) => {
        const d = projData[i] || projData[0];
        const ins = card.querySelectorAll('input[type=text]'); // [name, role, client]
        const ta = card.querySelector('textarea');             // desc
        if (ins[0]) ins[0].value = d.n;
        if (ins[1]) ins[1].value = d.r;
        if (ta) ta.value = d.d;
        if (ins[2]) ins[2].value = d.c;
      });

      // الخبرات السابقة: خبرتين (مع اسم الجهة)
      ensureCount('.exp-card', addExperience, 2);
      const expData = [
        { t: 'محلل أعمال', e: 'شركة الحلول الذكية', d: 'تحليل المتطلبات وإعداد الوثائق' },
        { t: 'مدير مشاريع', e: 'شركة التقنية المتقدمة', d: 'إدارة فرق التطوير' }
      ];
      document.querySelectorAll('.exp-card').forEach((card, i) => {
        const d = expData[i] || expData[0];
        const ins = card.querySelectorAll('input[type=text]'); // [title, entity]
        const ta = card.querySelector('textarea');             // desc
        if (ins[0]) ins[0].value = d.t;
        if (ins[1]) ins[1].value = d.e;
        if (ta) ta.value = d.d;
      });

      // ملف سيرة وهمي (يعدّي شرط الإلزامي)
      selectedFile = { fileName: 'test-cv.txt', mimeType: 'text/plain', base64: btoa('test cv content') };
      const fd = document.getElementById('fileNameDisplay');
      fd.innerHTML = '&#128206; test-cv.txt <span class="fn-clear" onclick="clearFile()">' + translations[currentLang].fileClear + '</span>';
      fd.style.display = 'block';

      // صورة وهمية (1x1 PNG)
      selectedPhoto = { fileName: 'test.png', mimeType: 'image/png', base64: 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==' };
      const pv = document.getElementById('photoPreview');
      pv.src = 'data:image/png;base64,' + selectedPhoto.base64;
      pv.style.display = 'block';
      document.getElementById('photoIcon').style.display = 'none';
      const pd = document.getElementById('photoNameDisplay');
      pd.innerHTML = '&#128247; test.png <span class="fn-clear" onclick="clearPhoto()">' + translations[currentLang].fileClear + '</span>';
      pd.style.display = 'block';

      alert('تمت التعبئة التجريبية ✅ — اضغط "إرسال النموذج" للاختبار.');
    }

    document.addEventListener('DOMContentLoaded', function () {
      setLang('ar');
      addEducation();
      addProject();
      addExperience();
      updateAddButtons();
      // إظهار زر الاختبار فقط عند إضافة ?test=1 للرابط
      if (location.search.indexOf('test=1') !== -1 || location.hash.indexOf('test') !== -1) {
        document.getElementById('testBtn').style.display = 'block';
      }
    });
  </script>

</body>

</html>
